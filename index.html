<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منوی ارکیده</title>
    <style>
        :root { --bg: #ffffff; --text: #222; --header-bg: #f4f4f4; --item-bg: #fafafa; --accent: #b8860b; }
        .dark-mode { --bg: #121212; --text: #e0e0e0; --header-bg: #1e1e1e; --item-bg: #252525; --accent: #d4af37; }

        body { margin: 0; padding: 0; font-family: Tahoma, Arial, sans-serif; background-color: var(--bg); color: var(--text); height: 100vh; overflow: hidden; transition: background 0.3s; }
        
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #001f3f; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: transform 0.8s cubic-bezier(0.77, 0, 0.175, 1); }
        .splash-logo { width: 250px; margin-bottom: 30px; }
        
        .hint-container { position: absolute; bottom: 40px; color: #ffffff; text-align: center; font-size: 0.9rem; display: flex; flex-direction: column; align-items: center; opacity: 0.8; }
        .typing-text { font-family: Tahoma, sans-serif; overflow: hidden; white-space: nowrap; animation: typing 2s steps(20, end); }
        @keyframes typing { from { width: 0; } to { width: 100%; } }
        
        .bounce-arrow { display: inline-block; animation: bounce 1.5s infinite; animation-delay: 2s; opacity: 0; animation-fill-mode: forwards; font-size: 1.5rem; margin-bottom: 5px; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px) scale(1.1); } }
        @keyframes fadeIn { to { opacity: 1; } }
        
        .slide-up { transform: translateY(-100%); }

        .switch-container { position: absolute; top: 15px; left: 15px; }
        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(24px); }

        #main-content { display: none; height: 100vh; opacity: 0; transition: opacity 1s ease; }
        .main-wrapper { display: flex; flex-direction: column; height: 100vh; padding: 10px; }
        .sticky-header { text-align: center; padding-top: 10px; position: relative; }
        .logo-img { width: 140px; }
        .menu-nav { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; margin: 10px 0; background: var(--header-bg); padding: 4px; border-radius: 50px; }
        .nav-item { padding: 5px 12px; border-radius: 50px; cursor: pointer; color: #777; font-size: 0.8rem; }
        .nav-item.active { background: var(--accent); color: #fff; }
        #list-container { flex-grow: 1; overflow-y: auto; max-width: 500px; margin: 0 auto; }
        .item-wrapper { border-bottom: 1px solid #f0f0f0; padding: 15px 10px; }
        .item-row { display: flex; justify-content: space-between; align-items: center; cursor: pointer; width: 100%; }
        .item-name { font-size: 1rem; font-weight: 600; color: var(--text); flex-grow: 1; }
        .item-price { color: var(--accent); font-weight: 700; font-size: 0.9rem; margin-right: 25px; white-space: nowrap; }
        .item-desc { max-height: 0; overflow: hidden; transition: all 0.6s ease-in-out; color: #888; font-size: 0.85rem; line-height: 1.6; text-align: right; opacity: 0; }
        .show-desc { max-height: 100px; margin-top: 10px; padding: 5px; background: var(--item-bg); border-radius: 5px; opacity: 1; }
    </style>
</head>
<body ontouchstart="handleSwipe()">

    <div id="splash-screen" onclick="hideSplash()">
        <img src="Logo1.png" alt="لوگو" class="splash-logo">
        <div class="hint-container">
            <div class="bounce-arrow" style="animation: bounce 1.5s infinite, fadeIn 0.5s 2s forwards;">▲</div>
            <div class="typing-text">به سمت بالا بکشید</div>
        </div>
    </div>

    <div id="main-content">
        <div class="main-wrapper">
            <div class="sticky-header">
                <div class="switch-container">
                    <label class="switch">
                        <input type="checkbox" onchange="toggleTheme()">
                        <span class="slider"></span>
                    </label>
                </div>
                <img src="Logo2.jpg" alt="لوگو" class="logo-img">
                <div class="menu-nav">
                    <div class="nav-item active" onclick="showMenu('hot', this)">بار گرم</div>
                    <div class="nav-item" onclick="showMenu('cold', this)">بار سرد</div>
                    <div class="nav-item" onclick="showMenu('tea', this)">دمنوش</div>
                    <div class="nav-item" onclick="showMenu('other', this)">سایر</div>
                </div>
            </div>
            <div id="list-container"></div>
        </div>
    </div>

    <script>
        const clickSound = new Audio('https://actions.google.com/sounds/v1/ui/click.ogg');
        function vibrate(ms) { if (navigator.vibrate) navigator.vibrate(ms); }
        function playTick() { clickSound.currentTime = 0; clickSound.play().catch(e => {}); vibrate(20); }

        function toggleTheme() { document.body.classList.toggle('dark-mode'); playTick(); }

        let lastScrollTop = 0;
        const container = document.getElementById('list-container');
        container.addEventListener('scroll', () => {
            let scrollTop = container.scrollTop;
            if (Math.abs(scrollTop - lastScrollTop) > 60) { playTick(); lastScrollTop = scrollTop; }
        });

        // حل مشکل ویبره با فعال‌سازی در اولین تعامل
        function hideSplash() { 
            vibrate(100); 
            document.getElementById('splash-screen').classList.add('slide-up'); 
            setTimeout(() => { 
                document.getElementById('main-content').style.display = 'block'; 
                document.getElementById('main-content').style.opacity = '1'; 
            }, 800); 
        }

        const menuData = {
            hot: [{name: 'اسپرسو سینگل', price: '45,000', desc: 'عصاره خالص و غلیظ قهوه'}, {name: 'اسپرسو دبل', price: '60,000', desc: 'دوز دوبرابر اسپرسو'}, {name: 'آمریکانو سینگل', price: '55,000', desc: 'اسپرسو با آب داغ'}, {name: 'آمریکانو دبل', price: '70,000', desc: 'دو شات اسپرسو با آب داغ'}, {name: 'لاته سینگل', price: '70,000', desc: 'اسپرسو با شیر بخار زده'}, {name: 'لاته دبل', price: '85,000', desc: 'اسپرسو دبل با شیر بخار زده'}, {name: 'ریسترتو', price: '45,000', desc: 'شات کوتاه و غلیظ'}, {name: 'اسپرسو ماکیاتو', price: '50,000', desc: 'اسپرسو با لکه‌ای فوم شیر'}, {name: 'کورتادو', price: '65,000', desc: 'ترکیب مساوی اسپرسو و شیر'}, {name: 'فلت وایت', price: '75,000', desc: 'اسپرسو با شیر مخملی'}, {name: 'لانگ بلک', price: '55,000', desc: 'قهوه غلیظ و معطر'}, {name: 'کاپوچینو', price: '75,000', desc: 'ترکیب اسپرسو، شیر و فوم'}, {name: 'کارامل ماکیاتو', price: '90,000', desc: 'لاته با طعم کارامل'}, {name: 'موکا', price: '85,000', desc: 'اسپرسو با شکلات و شیر'}, {name: 'چای', price: '35,000', desc: 'چای سیاه اصیل'}],
            cold: [{name: 'آیس امریکانو سینگل', price: '60,000', desc: 'اسپرسو سرد با آب و یخ'}, {name: 'آیس امریکانو دبل', price: '75,000', desc: 'اسپرسو دبل سرد با آب و یخ'}, {name: 'آیس لاته سینگل', price: '75,000', desc: 'شیر و اسپرسو سرد'}, {name: 'آیس لاته دبل', price: '90,000', desc: 'شیر و اسپرسو دبل سرد'}, {name: 'آیس اسپرسو سینگل', price: '50,000', desc: 'اسپرسو سرد و یخ'}, {name: 'آیس اسپرسو دبل', price: '65,000', desc: 'اسپرسو دبل سرد و یخ'}, {name: 'آیس کافی', price: '60,000', desc: 'قهوه دمی سرد'}, {name: 'کلد برو', price: '80,000', desc: 'قهوه دم شده در آب سرد'}, {name: 'آیس موکا', price: '90,000', desc: 'ترکیب سرد اسپرسو و شکلات'}, {name: 'آیس کارامل ماکیاتو', price: '95,000', desc: 'کارامل و لاته سرد'}, {name: 'فراپه', price: '100,000', desc: 'نوشیدنی قهوه میکس شده با یخ'}, {name: 'آفوگاتو', price: '85,000', desc: 'اسپرسو داغ روی بستنی'}],
            tea: [{name: 'دمنوش گل‌گاو‌زبان', price: '50,000', desc: 'آرام‌بخش و نشاط‌آور'}, {name: 'دمنوش به‌لیمو', price: '50,000', desc: 'معطر و تقویت‌کننده اعصاب'}, {name: 'دمنوش چای ترش', price: '45,000', desc: 'سرشار از آنتی‌اکسیدان'}, {name: 'دمنوش زنجبیل', price: '45,000', desc: 'تقویت سیستم ایمنی'}, {name: 'دمنوش دارچین', price: '45,000', desc: 'انرژی‌بخش'}, {name: 'دمنوش نعناع', price: '45,000', desc: 'کمک به هضم'}, {name: 'دمنوش بابونه', price: '50,000', desc: 'آرامش‌بخش'}, {name: 'دمنوش اسطوخودوس', price: '50,000', desc: 'کاهش استرس'}],
            other: []
        };

        function showMenu(cat, el) { playTick(); document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active')); el.classList.add('active'); document.getElementById('list-container').innerHTML = menuData[cat].length > 0 ? menuData[cat].map(i => `<div class="item-wrapper"><div class="item-row" onclick="toggleDesc(this)"><span class="item-name">${i.name}</span><span class="item-price">${i.price} تومان</span></div><div class="item-desc">${i.desc}</div></div>`).join('') : '<div style="text-align:center; padding:20px; opacity:0.5;">به زودی...</div>'; }
        function toggleDesc(el) { playTick(); const desc = el.nextElementSibling; document.querySelectorAll('.item-desc').forEach(d => { if(d !== desc) d.classList.remove('show-desc') }); desc.classList.toggle('show-desc'); }
        function handleSwipe() { let startY; window.addEventListener('touchstart', e => startY = e.touches[0].clientY); window.addEventListener('touchend', e => { if (startY - e.changedTouches[0].clientY > 50) hideSplash(); }); }
        showMenu('hot', document.querySelector('.nav-item'));
    </script>
</body>
</html>
