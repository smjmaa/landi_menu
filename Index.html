<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منوی ارکیده</title>
    <style>
        body { margin: 0; padding: 0; font-family: Tahoma, Arial, sans-serif; background-color: #ffffff; height: 100vh; overflow: hidden; }
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #001f3f; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: transform 0.8s cubic-bezier(0.77, 0, 0.175, 1); }
        .splash-logo { width: 250px; height: auto; margin-bottom: 40px; }
        .hint-container { position: absolute; bottom: 50px; color: #ffffff; display: flex; flex-direction: column; align-items: center; animation: bounce 2s infinite; cursor: pointer; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .slide-up { transform: translateY(-100%); }
        #main-content { display: none; height: 100vh; opacity: 0; transition: opacity 1s ease; }
        .main-wrapper { display: flex; flex-direction: column; height: 100vh; padding: 10px; box-sizing: border-box; }
        .sticky-header { flex-shrink: 0; text-align: center; }
        .logo-img { width: 140px; height: auto; animation: pulse 3s infinite ease-in-out; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .menu-nav { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; margin: 10px 0; background: #f4f4f4; padding: 4px; border-radius: 50px; }
        .nav-item { padding: 5px 15px; border-radius: 50px; cursor: pointer; color: #777; font-size: 0.85rem; transition: 0.3s; }
        .nav-item.active { background: #b8860b; color: #fff; }
        #list-container { flex-grow: 1; overflow-y: auto; width: 100%; max-width: 500px; margin: 0 auto; }
        .item-wrapper { border-bottom: 1px solid #f0f0f0; padding: 15px 10px; }
        .item-row { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .item-name { font-size: 1rem; font-weight: 600; color: #222; }
        .item-price { color: #b8860b; font-weight: 700; font-size: 0.9rem; }
        .item-desc { max-height: 0; overflow: hidden; transition: max-height 0.3s; color: #666; font-size: 0.75rem; line-height: 1.4; text-align: right; }
        .show-desc { max-height: 50px; margin-top: 5px; }
    </style>
</head>
<body ontouchstart="handleSwipe()">

    <div id="splash-screen" onclick="hideSplash()">
        <img src="logo1.png" alt="لوگوی صفحه اول" class="splash-logo">
        <div class="hint-container">
            <span style="font-weight:bold;">به سمت بالا بکشید</span>
        </div>
    </div>

    <div id="main-content">
        <div class="main-wrapper">
            <div class="sticky-header">
                <img src="logo2.jpg" alt="لوگوی منو" class="logo-img">
                <div class="menu-nav">
                    <div class="nav-item active" onclick="showMenu('coffee', this)">قهوه</div>
                    <div class="nav-item" onclick="showMenu('tea', this)">دمنوش</div>
                </div>
            </div>
            <div id="list-container"></div>
        </div>
    </div>

    <script>
        function hideSplash() {
            document.getElementById('splash-screen').classList.add('slide-up');
            setTimeout(() => {
                document.getElementById('main-content').style.display = 'block';
                document.getElementById('main-content').style.opacity = '1';
            }, 800);
        }
        const menuData = {
            coffee: [{name: 'اسپرسو', price: '45,000', desc: 'عصاره خالص'}],
            tea: [{name: 'چای سیاه', price: '40,000', desc: 'چای اصیل'}]
        };
        const container = document.getElementById('list-container');
        function showMenu(cat, el) {
            container.innerHTML = menuData[cat].map(i => `<div class="item-wrapper"><div class="item-row"><span>${i.name}</span><span>${i.price}</span></div><div class="item-desc">${i.desc}</div></div>`).join('');
        }
        showMenu('coffee', document.querySelector('.nav-item'));
    </script>
</body>
</html>
